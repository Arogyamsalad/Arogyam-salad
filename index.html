<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arogyam Salad - Healthy Meals</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .card-shadow { box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.15); }
        #modal { display: none; align-items: center; justify-content: center; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; backdrop-filter: blur(8px); }
        /* Image load hoyila vel lagla tar animation disel */
        .img-container { background: #e5e7eb; position: relative; overflow: hidden; }
        .img-container::after {
            content: "Loading...";
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 12px; color: #9ca3af; font-weight: bold;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <header class="bg-green-600 text-white py-16 text-center shadow-2xl">
        <h1 class="text-6xl font-black tracking-tighter uppercase italic drop-shadow-md">Arogyam Salad</h1>
        <p class="mt-4 text-xl font-medium text-green-100 italic px-6">Treat you and your loved one's with something healthy</p>
    </header>

    <section class="max-w-6xl mx-auto px-4 py-20">
        <div class="grid md:grid-cols-2 gap-12">
            
            <div class="bg-white rounded-[2.5rem] overflow-hidden card-shadow border border-gray-100 flex flex-col group">
                <div class="relative h-80 img-container">
                    <img src="veg.jpg.jpg" onerror="this.src='veg.jpg'" loading="lazy" class="w-full h-full object-cover relative z-10">
                    <div class="absolute top-6 left-6 bg-green-600 text-white px-5 py-1.5 rounded-full font-bold shadow-lg italic z-20">~168 CAL</div>
                </div>
                <div class="p-10 flex-grow text-center">
                    <h3 class="text-3xl font-black text-green-700 mb-4 italic uppercase">1. VEG SALAD</h3>
                    <button onclick="openModal('Veg Salad')" class="w-full bg-green-600 text-white font-black py-5 rounded-2xl shadow-xl uppercase tracking-widest hover:bg-green-700 transition-all">Order Now</button>
                </div>
            </div>

            <div class="bg-white rounded-[2.5rem] overflow-hidden card-shadow border border-gray-100 flex flex-col group text-center">
                <div class="relative h-80 img-container">
                    <img src="paneer.jpg.jpg" onerror="this.src='paneer.jpg'" loading="lazy" class="w-full h-full object-cover relative z-10">
                    <div class="absolute top-6 left-6 bg-blue-600 text-white px-5 py-1.5 rounded-full font-bold shadow-lg italic z-20">~443 CAL</div>
                </div>
                <div class="p-10 flex-grow">
                    <h3 class="text-3xl font-black text-blue-700 mb-4 italic uppercase">2. PANEER SALAD</h3>
                    <button onclick="openModal('Paneer Salad')" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl uppercase tracking-widest hover:bg-blue-700 transition-all">Order Now</button>
                </div>
            </div>

            <div class="bg-white rounded-[2.5rem] overflow-hidden card-shadow border border-gray-100 flex flex-col group text-center">
                <div class="relative h-80 img-container">
                    <img src="chicken.jpg.jpg" onerror="this.src='chicken.jpg'" loading="lazy" class="w-full h-full object-cover relative z-10">
                    <div class="absolute top-6 left-6 bg-red-600 text-white px-5 py-1.5 rounded-full font-bold shadow-lg italic z-20">~269 CAL</div>
                </div>
                <div class="p-10 flex-grow">
                    <h3 class="text-3xl font-black text-red-700 mb-4 italic uppercase leading-tight">3. CHICKEN SALAD</h3>
                    <button onclick="openModal('Chicken Salad')" class="w-full bg-red-600 text-white font-black py-5 rounded-2xl shadow-xl uppercase tracking-widest hover:bg-red-700 transition-all">Order Now</button>
                </div>
            </div>

            <div class="bg-white rounded-[2.5rem] overflow-hidden card-shadow border border-gray-100 flex flex-col group text-center">
                <div class="relative h-80 img-container">
                    <img src="protein.jpg.jpg" onerror="this.src='protein.jpg'" loading="lazy" class="w-full h-full object-cover relative z-10">
                    <div class="absolute top-6 left-6 bg-purple-600 text-white px-5 py-1.5 rounded-full font-bold shadow-lg italic z-20">~356 CAL</div>
                </div>
                <div class="p-10 flex-grow">
                    <h3 class="text-3xl font-black text-purple-700 mb-4 italic uppercase leading-tight">4. PROTEIN BOWL</h3>
                    <button onclick="openModal('High Protein Bowl')" class="w-full bg-purple-600 text-white font-black py-5 rounded-2xl shadow-xl uppercase tracking-widest hover:bg-purple-700 transition-all">Order Now</button>
                </div>
            </div>

        </div>
    </section>

    <footer class="bg-gray-900 text-white py-16 text-center">
        <h3 class="text-2xl font-black italic text-green-500 mb-4 tracking-widest">AROGYAM SALAD</h3>
        <p class="text-gray-400">8806040158 / 7040250029</p>
    </footer>

    <div id="modal">
        <div class="bg-white rounded-[3rem] p-12 max-w-md w-full mx-4 shadow-2xl relative text-center">
            <h3 class="text-3xl font-black mb-8 uppercase tracking-tight">Select Dressing</h3>
            <div class="space-y-4">
                <button onclick="sendOrder('Creamy Curd')" class="w-full py-5 border-2 rounded-2xl font-bold hover:bg-green-50 transition-all">Creamy Curd</button>
                <button onclick="sendOrder('Garlic Curd')" class="w-full py-5 border-2 rounded-2xl font-bold hover:bg-green-50 transition-all">Garlic Curd</button>
                <button onclick="sendOrder('Mayonnaise')" class="w-full py-5 border-2 rounded-2xl font-bold hover:bg-green-50 transition-all">Mayonnaise</button>
            </div>
            <button onclick="closeModal()" class="mt-8 text-gray-400 font-bold uppercase text-xs tracking-widest">Cancel</button>
        </div>
    </div>

    <script>
        let currentSalad = '';
        function openModal(name) { currentSalad = name; document.getElementById('modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function sendOrder(dressing) {
            const phone = "918806040158";
            const msg = `*NEW ORDER*\nSalad: *${currentSalad}*\nDressing: *${dressing}*`;
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
            closeModal();
        }
    </script>
</body>
</html>
